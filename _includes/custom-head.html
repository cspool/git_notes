<style>
  .mermaid {
    margin: 1.5rem 0;
    overflow-x: auto;
    text-align: center;
  }

  .mermaid svg {
    height: auto;
    max-width: 100%;
  }
</style>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";

  mermaid.initialize({
    startOnLoad: false,
    securityLevel: "loose",
    theme: "default"
  });

  window.addEventListener("DOMContentLoaded", async () => {
    const codeBlocks = document.querySelectorAll(
      "pre > code.language-mermaid, .language-mermaid pre > code"
    );

    codeBlocks.forEach((codeBlock) => {
      const diagram = document.createElement("div");
      diagram.className = "mermaid";
      diagram.textContent = codeBlock.textContent;

      const wrapper = codeBlock.closest(".language-mermaid.highlighter-rouge")
        || codeBlock.closest("pre")
        || codeBlock;
      wrapper.replaceWith(diagram);
    });

    await mermaid.run({
      querySelector: ".mermaid"
    });
  });
</script>
